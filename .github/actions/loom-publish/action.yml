name: "Loom publish gate"
description: "Run `loom publish` and block when the deterministic eval tier (static valid + trace/output) fails."

inputs:
  plugin-dir:
    description: "Path to the plugin to publish-check"
    required: true
    default: "."

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@v6
    - uses: actions/setup-node@v6
      with:
        node-version: 22
        cache: pnpm
    - run: pnpm install --frozen-lockfile
      shell: bash
    - run: pnpm build
      shell: bash
    # Exits non-zero when the deterministic tier fails -> the step (and job) fails,
    # blocking the publish. Harnesses absent on the runner are reported UNTESTED.
    - run: node packages/cli/dist/index.js publish "${{ inputs.plugin-dir }}"
      shell: bash
