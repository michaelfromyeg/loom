component: io.github.michaelfromyeg/developing-loom:developing-loom
harnesses: [claude]
cases:
  - name: adapter-dependency-rule
    prompt: "In the Loom monorepo, a harness adapter package may only depend on which two Loom packages? Answer with the package names."
    assert:
      - kind: output
        matches: "(?i)adapter-kit"
      - kind: output
        matches: "(?i)schema"
  - name: coverage-gate
    prompt: "What minimum test coverage percentage must changes to Loom keep, per its contributor guidance? Give the number."
    assert:
      - kind: output
        matches: "80"
